services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravelbe_app
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db
    mem_limit: 512m
    cpus: 0.5

  web:
    image: nginx:latest
    container_name: laravelbe_web
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    mem_limit: 256m
    cpus: 0.25

  db:
    image: mysql:8.0
    container_name: laravelbe_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravelbe
    ports:
      - "3309:3306"
    volumes:
      - laravelbe_dbdata:/var/lib/mysql
    mem_limit: 1g
    cpus: 0.5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: laravelbe_pma
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db
    mem_limit: 256m
    cpus: 0.25

volumes:
  laravelbe_dbdata:
